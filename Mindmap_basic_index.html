<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mindmap Tool</title>
  <link rel="stylesheet" href="./mindmap.css" />
</head>
<body>
  <!-- Node context panel: floats near the selected node -->
  <div id="nodeContextPanel">
    <button type="button" id="addBtn" aria-label="Add Child Node" data-tooltip="Add Child (N)">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span class="button-label">Add</span>
    </button>
    <button type="button" id="deleteBtn" aria-label="Delete Node" data-tooltip="Delete Node (Delete)">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span class="button-label">Delete</span>
    </button>
    <button type="button" id="attachBtn" aria-label="Attachments" data-tooltip="Attachments">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="button-label">Attach</span>
    </button>
    <span class="ctx-sep" aria-hidden="true"></span>
    <button type="button" id="tagBtn" aria-label="Edit node tags" data-tooltip="Tags (T)">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="7" cy="7" r="1.5" fill="currentColor"/>
      </svg>
      <span class="button-label">Tags</span>
    </button>
    <button type="button" id="noteBtn" aria-label="Node Note" data-tooltip="Note (O)">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="button-label">Note</span>
    </button>
    <button type="button" id="relLinkBtn" aria-label="Relationship Line" data-tooltip="Relate (R)">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M15 3h6v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 14L21 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="button-label">Relate</span>
    </button>
  </div>

  <div id="toolbar">
    <button type="button" id="centerBtn" aria-label="Center View" data-tooltip="Center View (C)">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="3.25" stroke="currentColor" stroke-width="2" />
        <path d="M12 4v3M12 17v3M4 12h3M17 12h3" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span class="button-label">Center</span>
    </button>
    <button type="button" id="undoBtn" disabled aria-label="Undo" data-tooltip="Undo (Ctrl/Cmd+Z)">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M9 7L5 11L9 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M6 11h8a5 5 0 010 10h-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span class="button-label">Undo</span>
    </button>
    <button type="button" id="clearBtn" aria-label="Clear All" data-tooltip="Clear All">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 7h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        <path d="M9 7V5h6v2M8 7l1 12h6l1-12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <path d="M10 10v6M14 10v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span class="button-label">Trash</span>
    </button>

    <button type="button" id="pinBtn" aria-label="Toggle Pin Node" data-tooltip="Pin/Unpin Node (P)">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M8 4h8l-1 4 3 3-4 1-2 7-2-7-4-1 3-3-1-4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
      </svg>
      <span class="button-label">Pin</span>
    </button>

    <button type="button" id="saveBtn" aria-label="Save to Gist" data-tooltip="Save to Gist">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 4h11l3 3v13H5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
        <path d="M8 4v6h8V4M9 16h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span class="button-label">Save</span>
    </button>
    <button type="button" id="loadBtn" aria-label="Load from JSON file" data-tooltip="Load from JSON file">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 4h11l3 3v13H5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
        <path d="M12 10v7M9 14l3 3 3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span class="button-label">Load</span>
    </button>
    <input type="file" id="loadFileInput" accept=".json,.mind,application/json" style="display:none" />
    <button type="button" id="savePartBtn" aria-label="Save as Global Part" data-tooltip="Save as Global Part">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="M2 12h3M19 12h3M12 2v3M12 19v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 8v4l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="button-label">Save Part</span>
    </button>

    <button type="button" id="partsBtn" aria-label="Global Parts Library" data-tooltip="Global Parts Library">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <ellipse cx="12" cy="12" rx="10" ry="10" stroke="currentColor" stroke-width="2"/>
        <path d="M2 12h20M12 2c-3 3-4.5 6-4.5 10s1.5 7 4.5 10M12 2c3 3 4.5 6 4.5 10s-1.5 7-4.5 10" stroke="currentColor" stroke-width="2"/>
      </svg>
      <span class="button-label">Parts</span>
    </button>
    <button type="button" id="mapsBtn" aria-label="Maps" data-tooltip="Manage Maps">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="8" y1="2" x2="8" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="16" y1="6" x2="16" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="button-label">Maps</span>
    </button>


    <span class="toolbar-sep" aria-hidden="true"></span>
    <button type="button" id="toolbarMinBtn" aria-label="Minimize toolbar" data-tooltip="Minimize toolbar">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button type="button" id="toolbarToggle" aria-label="Toggle Toolbar" data-mobile-only="true" data-tooltip="Toggle Toolbar">
      <svg class="button-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span class="button-label">Menu</span>
    </button>
  </div>

  <button id="toolbarRevealBtn" aria-label="Show toolbar">
    <svg viewBox="0 0 24 24" fill="none" width="13" height="13" aria-hidden="true">
      <path d="M18 15l-6-6-6 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Controls
  </button>

  <div id="partsPanel">
    <div class="parts-panel-header">
      <span class="parts-panel-title">
        <svg viewBox="0 0 24 24" fill="none" width="14" height="14" aria-hidden="true">
          <ellipse cx="12" cy="12" rx="10" ry="10" stroke="currentColor" stroke-width="2"/>
          <path d="M2 12h20M12 2c-3 3-4.5 6-4.5 10s1.5 7 4.5 10M12 2c3 3 4.5 6 4.5 10s-1.5 7-4.5 10" stroke="currentColor" stroke-width="2"/>
        </svg>
        Global Parts
      </span>
      <button type="button" id="partsPanelClose" aria-label="Close panel">
        <svg viewBox="0 0 24 24" fill="none" width="12" height="12">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="parts-panel-hint">Select a node, then click <strong>Insert Ref</strong> below to place a linked instance.</div>
    <div id="partsList"></div>
  </div>

  <div id="mapsPanel">
    <div class="maps-panel-header">
      <span class="maps-panel-title">
        <svg viewBox="0 0 24 24" fill="none" width="14" height="14" aria-hidden="true">
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Maps
      </span>
      <div class="maps-panel-header-actions">
        <button type="button" id="mapsPanelAddBtn" class="maps-panel-add-btn" aria-label="Add new map" title="Add new map">
          <svg viewBox="0 0 24 24" fill="none" width="13" height="13">
            <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
          New Map
        </button>
        <button type="button" id="mapsPanelClose" aria-label="Close maps panel">
          <svg viewBox="0 0 24 24" fill="none" width="12" height="12">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="mapsList"></div>
  </div>

  <div id="tagPanel">
    <div class="tag-panel-header">
      <span id="tagPanelTitle">Tags</span>
      <button type="button" id="tagPanelClose" aria-label="Close tags panel">
        <svg viewBox="0 0 24 24" fill="none" width="12" height="12">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div id="tagChips" class="tag-chips-container"></div>
    <div class="tag-input-row">
      <input type="text" id="tagInput" placeholder="Add tag, press Enter" maxlength="30" autocomplete="off" spellcheck="false"/>
    </div>
  </div>

  <div id="attachPanel">
    <div class="attach-panel-header">
      <span id="attachPanelTitle">Attachments</span>
      <button type="button" id="attachPanelClose" aria-label="Close attachments panel">
        <svg viewBox="0 0 24 24" fill="none" width="12" height="12">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div id="attachList" class="attach-list"></div>
    <label class="attach-drop-zone" id="attachDropZone">
      <input type="file" id="attachFileInput" multiple accept="image/*,.pdf,.doc,.docx,.txt,.csv,.xls,.xlsx,.ppt,.pptx,.zip" />
      <svg viewBox="0 0 24 24" fill="none" width="18" height="18" aria-hidden="true">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Click or drop files (max 25 MB each)</span>
    </label>
  </div>

  <div id="notePanel">
    <div class="note-panel-header">
      <span id="notePanelTitle">Note</span>
      <button type="button" id="notePanelClose" aria-label="Close note panel">
        <svg viewBox="0 0 24 24" fill="none" width="12" height="12">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="note-toolbar">
      <button type="button" data-cmd="bold" title="Bold (Ctrl+B)" class="note-fmt-btn"><b>B</b></button>
      <button type="button" data-cmd="italic" title="Italic (Ctrl+I)" class="note-fmt-btn"><i>I</i></button>
      <button type="button" data-cmd="underline" title="Underline (Ctrl+U)" class="note-fmt-btn"><u>U</u></button>
      <span class="note-toolbar-sep"></span>
      <button type="button" data-cmd="formatBlock" data-val="h2" title="Heading" class="note-fmt-btn">H</button>
      <button type="button" data-cmd="formatBlock" data-val="p" title="Paragraph" class="note-fmt-btn">P</button>
      <span class="note-toolbar-sep"></span>
      <button type="button" data-cmd="insertUnorderedList" title="Bullet list" class="note-fmt-btn">
        <svg viewBox="0 0 16 16" fill="none" width="13" height="13"><circle cx="2" cy="4" r="1.5" fill="currentColor"/><line x1="5" y1="4" x2="15" y2="4" stroke="currentColor" stroke-width="1.5"/><circle cx="2" cy="8" r="1.5" fill="currentColor"/><line x1="5" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5"/><circle cx="2" cy="12" r="1.5" fill="currentColor"/><line x1="5" y1="12" x2="15" y2="12" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button type="button" data-cmd="insertOrderedList" title="Numbered list" class="note-fmt-btn">
        <svg viewBox="0 0 16 16" fill="none" width="13" height="13"><text x="0" y="5" font-size="5" fill="currentColor">1.</text><line x1="5" y1="4" x2="15" y2="4" stroke="currentColor" stroke-width="1.5"/><text x="0" y="9" font-size="5" fill="currentColor">2.</text><line x1="5" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5"/><text x="0" y="13" font-size="5" fill="currentColor">3.</text><line x1="5" y1="12" x2="15" y2="12" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>
    <div id="noteEditor" class="note-editor" contenteditable="true" spellcheck="true"
         aria-label="Node note" aria-multiline="true"
         data-placeholder="Write a note for this node…"></div>
    <div id="noteLinksList" class="note-links-list"></div>
  </div>

  <div id="relPanel">
    <div class="rel-panel-header">
      <span id="relPanelTitle">Relationships</span>
      <button type="button" id="relPanelClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" width="12" height="12">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <!-- Manage view: list of existing relationships + add new -->
    <div id="relManageView" class="rel-manage-view">
      <div id="relManageList" class="rel-manage-list"></div>
      <button type="button" id="relAddNewBtn" class="rel-add-new-btn">
        <svg viewBox="0 0 24 24" fill="none" width="13" height="13" aria-hidden="true">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        New Relationship
      </button>
    </div>
    <!-- Edit view: form for a specific relationship -->
    <div id="relEditView" class="rel-edit-view">
      <button type="button" id="relBackBtn" class="rel-back-btn">
        <svg viewBox="0 0 24 24" fill="none" width="12" height="12" aria-hidden="true">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
      </button>
      <div class="rel-panel-body">
        <div class="rel-field">
          <label class="rel-field-label" for="relLabelInput">Label</label>
          <input type="text" id="relLabelInput" class="rel-label-input" placeholder="Optional label…" maxlength="60" />
        </div>
        <div class="rel-field">
          <label class="rel-field-label">Direction</label>
          <div class="rel-dir-row">
            <button type="button" data-dir="forward" class="rel-dir-btn active">→ Forward</button>
            <button type="button" data-dir="backward" class="rel-dir-btn">← Backward</button>
            <button type="button" data-dir="both" class="rel-dir-btn">↔ Both</button>
          </div>
        </div>
        <div class="rel-field">
          <label class="rel-field-label">Color</label>
          <div class="rel-color-row" id="relColorRow"></div>
        </div>
        <div class="rel-panel-actions">
          <button type="button" id="relDeleteBtn" class="rel-delete-btn">Delete</button>
          <button type="button" id="relSaveBtn" class="rel-save-btn">Add</button>
        </div>
      </div>
    </div>
  </div>

  <div id="attachLightbox">
    <div class="attach-lightbox-backdrop" id="attachLightboxBackdrop"></div>
    <div class="attach-lightbox-box">
      <button class="attach-lightbox-close" id="attachLightboxClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>
      <img id="attachLightboxImg" src="" alt="" />
      <div id="attachLightboxFilename"></div>
    </div>
  </div>

  <div id="impactModal" role="dialog" aria-modal="true" aria-labelledby="impactModalTitle">
    <div class="impact-modal-box">
      <h3 id="impactModalTitle">Push Update</h3>
      <div id="impactModalBody"></div>
      <div class="impact-modal-actions">
        <button type="button" id="impactCancelBtn" class="impact-btn-cancel">Cancel</button>
        <button type="button" id="impactConfirmBtn" class="impact-btn-confirm">Push Update</button>
      </div>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="mindmap"></canvas>
    <input id="renameInput" type="text" />
    <button id="reorderUp">↑</button>
    <button id="reorderDown">↓</button>
  </div>
  <div id="statusMessage"></div>
  <div id="loadingIndicator">
    <div class="spinner"></div>
    <div id="loadingText">Loading mindmap...</div>
  </div>

  <div id="searchBar">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
      <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <input id="searchInput" type="text" placeholder="Search nodes… (/)" autocomplete="off" spellcheck="false" />
    <button type="button" id="searchClear" aria-label="Clear search">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" width="10" height="10">
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div id="searchResults" role="listbox" aria-label="Search results"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="./mindmap-bundle.js"></script>
</body>
</html>
